name: CI
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'tests/**'
      - 'specs/**'
      - 'build.ps1'
      - 'psakefile.ps1'
      - 'requirements.psd1'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'specs/**'
      - 'build.ps1'
      - 'psakefile.ps1'
      - 'requirements.psd1'
  workflow_dispatch:
jobs:
  test:
    name: Run Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
    steps:
    - uses: actions/checkout@v4
    - name: Test
      shell: pwsh
      run: ./build.ps1 -Task Test -Bootstrap
